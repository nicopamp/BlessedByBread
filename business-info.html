<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Business Info – Blessed by Bread</title>
  <meta
    name="description"
    content="Business information for Blessed by Bread, including Loudoun County licensing and food liability insurance details."
  />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="canonical" href="https://blessedbybread.com/business-info.html" />

  <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <img
          src="assets/images/logo-bbb-400.png"
          alt="Blessed by Bread logo"
          width="200"
          height="168"
          decoding="async"
        />
      </a>

      <nav class="main-nav" aria-label="Main navigation">
        <button
          class="nav-toggle"
          aria-expanded="false"
          aria-controls="nav-menu"
          aria-label="Toggle navigation menu"
        >
          <span class="nav-toggle-bar"></span>
          <span class="visually-hidden">Toggle navigation</span>
        </button>

        <ul id="nav-menu">
          <li><a href="breads.html">Our Breads</a></li>
          <li><a href="order.html">How to Order</a></li>
          <li><a href="reviews.html">Reviews</a></li>
          <li><a href="about.html">About Lise</a></li>
          <li><a href="business-info.html" class="active">Business Info</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="section business-page">

      <!-- Business License -->
      <div class="container narrow text-centered business-block">
        <h1>Business License</h1>

        <picture>
          <source
            type="image/webp"
            srcset="
              assets/images/business-license-800.webp 800w,
              assets/images/business-license-1200.webp 1200w
            "
            sizes="(max-width: 768px) 90vw, 60vw"
          >
          <source
            type="image/jpeg"
            srcset="
              assets/images/business-license-800.jpg 800w,
              assets/images/business-license-1200.jpg 1200w
            "
            sizes="(max-width: 768px) 90vw, 60vw"
          >
          <img
            src="assets/images/business-license-800.jpg"
            alt="Lise holding her business license"
            class="section-photo"
            width="1124"
            height="980"
            loading="lazy"
            decoding="async"
          >
        </picture>
      </div>

      <!-- Insurance Certificate -->
      <div class="container narrow text-centered business-block">
        <h2>Fully Insured</h2>

        <picture>
          <source
            type="image/webp"
            srcset="
              assets/images/insurance-certificate-800.webp 800w,
              assets/images/insurance-certificate-1200.webp 1200w
            "
            sizes="(max-width: 768px) 90vw, 60vw"
          >
          <source
            type="image/png"
            srcset="
              assets/images/insurance-certificate-800.png 800w,
              assets/images/insurance-certificate-1200.png 1200w
            "
            sizes="(max-width: 768px) 90vw, 60vw"
          >
          <img
            src="assets/images/insurance-certificate-800.png"
            alt="Food liability insurance certificate"
            class="section-photo"
            width="986"
            height="424"
            loading="lazy"
            decoding="async"
          >
        </picture>
      </div>

    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p class="footer-brand">Blessed by Bread</p>
      <p class="footer-copy">&copy; <span id="year"></span> Blessed by Bread.</p>
    </div>
  </footer>

  <script src="assets/js/main.js" defer></script>
  <!-- Cloudflare Web Analytics -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token":"a64da1faa4c540bab1b50d739fed07a8"}'></script>
  <!-- End Cloudflare Web Analytics -->
</body>
</html>
